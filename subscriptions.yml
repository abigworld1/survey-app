# 分野設定（自分専用）。分野ごとに username(URLスラッグ) / label(表示名) / keywords / k / sources を指定。
#  - username: 公開URL（/survey-app/<username>/）になる ASCII スラッグ。実名・PIIは入れない。
#  - label:    トップや一覧に表示される日本語の分野名。
#  - keywords: ソース横断の検索語（OR検索）。
#  - search_queries: 取得用の検索語。指定すると keywords ではなくこちらで検索する。
#  - k:        1日に生成するページ数の上限（安全のため最大 20）。
#  - sources:  arxiv / openalex / semanticscholar / dblp から選択。
subscriptions:
  - username: mapf-mapd-warehouse
    label: 自動倉庫におけるマルチエージェント計画・タスク形成最適化
    keywords:
      - "Multi-Agent Path Finding"
      - "MAPF"
      - "Multi-Agent Pickup and Delivery"
      - "MAPD"
      - "MT-MAPD"
      - "Task Allocation and Path Planning"
      - "Multi-Agent Task Allocation"
      - "Lifelong Multi-Agent Path Finding"
      - "Online Multi-Agent Path Finding"
      - "Robotic Warehouse"
    search_queries:
      - "Multi-Agent Path Finding"
      - "MAPF"
      - "Multi-Agent Pickup and Delivery"
      - "MAPD"
      - "Lifelong Multi-Agent Path Finding"
      - "Online Multi-Agent Path Finding"
    k: 2
    sources: [arxiv, openalex]

  - username: doc-structure-rag
    label: 文書構造解析に基づく検索・質問応答・RAG
    keywords:
      - "Document Structure Analysis"
      - "PDF Layout Understanding"
      - "Document Structure Graph"
      - "Retrieval-Augmented Generation"
      - "RAG"
      - "Evidence Retrieval"
    k: 2
    sources: [arxiv, semanticscholar, openalex]

  # 手動追加用（日次cronは触らない）。任意のPDF/URL/arXiv IDを add_paper で追加する。
  - username: reading
    label: 個別に読んだ論文
    manual: true
