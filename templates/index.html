<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>survey-app — 論文サーベイ自動要約</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; background:#121212; color:#e8e8e8;
         font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
         line-height:1.7; }
  .wrap { max-width:820px; margin:0 auto; padding:36px 20px 64px; }
  h1 { font-size:1.8rem; margin:0 0 6px; }
  .lead { color:#9a9a9a; margin:0 0 28px; }
  h2 { font-size:1.05rem; color:#7ec699; border-bottom:1px solid #2a2a2a;
       padding-bottom:6px; margin:32px 0 14px; }
  .cards { display:flex; flex-wrap:wrap; gap:12px; }
  .card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px;
          padding:14px 16px; min-width:220px; flex:1 1 220px; }
  .card h3 { margin:0 0 6px; font-size:1.02rem; }
  .card a { color:#7cc6ff; text-decoration:none; }
  ul { list-style:none; padding:0; margin:0; }
  li { padding:12px 0; border-bottom:1px solid #2a2a2a; }
  li a { color:#7cc6ff; text-decoration:none; }
  .meta { color:#9a9a9a; font-size:12.5px; margin-top:4px; }
  footer { margin-top:44px; color:#888; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>survey-app</h1>
  <p class="lead"><a href="https://abigworld1.github.io/">私</a>の研究に関連する論文を毎日複数本、日本語で自動要約します。</p>

  <h2>分野</h2>
  <div class="cards">{{cards}}</div>

  <h2>最近の要約</h2>
  <ul>{{recent}}</ul>

  <footer>
    ⚠ 各ページは AI による自動生成・要約です（誤りを含む可能性があります）。必ず原典をご確認ください。<br>
    最終更新: {{generated}}
  </footer>
</div>
</body>
</html>
