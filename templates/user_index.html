<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>{{username}} の論文サーベイ | survey-app</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; background:#121212; color:#e8e8e8;
         font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
         line-height:1.7; }
  .wrap { max-width:760px; margin:0 auto; padding:32px 20px 64px; }
  nav { font-size:13px; margin-bottom:20px; }
  nav a { color:#9ad; text-decoration:none; }
  h1 { font-size:1.5rem; margin:0 0 4px; }
  .sub { color:#9a9a9a; font-size:13px; margin-bottom:24px; }
  ul { list-style:none; padding:0; margin:0; }
  li { padding:14px 0; border-bottom:1px solid #2a2a2a; }
  li.latest { background:#1d241d; border-left:3px solid #d9b65f;
              padding-left:12px; margin-left:-15px; padding-right:12px; }
  li a { color:#7cc6ff; text-decoration:none; font-size:1.02rem; }
  .authors { color:#b0b0b0; font-size:12.5px; margin-top:3px; }
  .meta { color:#9a9a9a; font-size:12.5px; margin-top:4px; }
  .tags { display:flex; flex-wrap:wrap; gap:5px; margin:5px 0 0; }
  .tag { color:#cfd8dc; background:#263238; border:1px solid #3b4a50;
         border-radius:999px; padding:1px 7px; font-size:11px; line-height:1.45; }
  .badge-latest { display:inline-block; color:#121212; background:#d9b65f;
                  border-radius:999px; font-size:11px; font-weight:700;
                  line-height:1; padding:4px 7px; margin-right:8px; vertical-align:1px; }
  .list-toolbar { display:flex; justify-content:space-between; gap:10px; margin:-8px 0 10px; }
  .list-toolbar input, .list-toolbar select { background:#1a1a1a; color:#e8e8e8;
                         border:1px solid #3a3a3a; border-radius:6px; padding:6px 9px;
                         font:inherit; font-size:12.5px; }
  .list-toolbar input { flex:1 1 260px; min-width:0; }
  .list-empty { display:none; color:#9a9a9a; font-size:13px; padding:12px 0; }
  .list-empty.show { display:block; }
  footer { margin-top:40px; color:#888; font-size:12px; }
  mjx-container { overflow-x:auto; overflow-y:hidden; max-width:100%; }
</style>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body>
<div class="wrap">
  <nav><a href="../index.html">← survey-app トップ</a></nav>
  <h1>{{username}}</h1>
  <div class="sub">{{count}} 本のサーベイ</div>
  <div class="list-toolbar">
    <input type="search" data-search-control data-target="#paper-list" placeholder="検索" aria-label="検索">
    <select data-sort-control data-target="#paper-list" aria-label="並び替え">
      <option value="added-desc">追加順（新しい順）</option>
      <option value="published-desc">公開日（新しい順）</option>
      <option value="published-asc">公開日（古い順）</option>
      <option value="title-asc">タイトル順</option>
    </select>
  </div>
  <div class="list-empty" data-empty-for="#paper-list">一致する論文はありません。</div>
  <ul id="paper-list" data-sort-list>{{items}}</ul>
  <footer>AIによる自動生成・要約です（誤りを含む可能性があります）。最終更新: {{generated}}</footer>
</div>
<script>
(function () {
  function compareText(a, b, direction) {
    var result = a.localeCompare(b, 'ja');
    return direction === 'asc' ? result : -result;
  }
  function sortList(select) {
    var list = document.querySelector(select.dataset.target);
    if (!list) return;
    var mode = select.value;
    var items = Array.prototype.slice.call(list.querySelectorAll('li'));
    items.sort(function (a, b) {
      var result = 0;
      if (mode === 'published-desc') result = compareText(a.dataset.published || '', b.dataset.published || '', 'desc');
      else if (mode === 'published-asc') result = compareText(a.dataset.published || '', b.dataset.published || '', 'asc');
      else if (mode === 'title-asc') result = compareText(a.dataset.title || '', b.dataset.title || '', 'asc');
      else result = compareText(a.dataset.added || '', b.dataset.added || '', 'desc');
      return result || (Number(a.dataset.original || 0) - Number(b.dataset.original || 0));
    });
    items.forEach(function (item) { list.appendChild(item); });
    if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([list]);
  }
  function filterList(input) {
    var list = document.querySelector(input.dataset.target);
    if (!list) return;
    var query = input.value.trim().toLowerCase();
    var visible = 0;
    list.querySelectorAll('li').forEach(function (item) {
      var match = !query || (item.dataset.search || '').indexOf(query) !== -1;
      item.hidden = !match;
      if (match) visible += 1;
    });
    var empty = document.querySelector('[data-empty-for="' + input.dataset.target + '"]');
    if (empty) empty.classList.toggle('show', visible === 0);
  }
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-sort-control]').forEach(function (select) {
      select.addEventListener('change', function () { sortList(select); });
      sortList(select);
    });
    document.querySelectorAll('[data-search-control]').forEach(function (input) {
      input.addEventListener('input', function () { filterList(input); });
      filterList(input);
    });
  });
}());
</script>
</body>
</html>
