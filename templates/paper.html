<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>{{title}} | survey-app</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; background:#121212; color:#e8e8e8;
         font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
         line-height:1.8; }
  .wrap { max-width:760px; margin:0 auto; padding:32px 20px 64px; }
  nav { font-size:13px; margin-bottom:20px; }
  nav a { color:#9ad; text-decoration:none; }
  h1 { font-size:1.5rem; line-height:1.5; margin:0 0 12px; }
  .meta { color:#9a9a9a; font-size:13px; }
  .links a { color:#7cc6ff; text-decoration:none; margin-right:4px; }
  .tldr { background:#1c2533; border-left:3px solid #4a90d9; padding:12px 16px;
          border-radius:6px; margin:18px 0 26px; }
  .qa { margin:0 0 20px; }
  .qa h2 { font-size:1.02rem; color:#7ec699; border-bottom:1px solid #2a2a2a;
           padding-bottom:6px; margin:0 0 8px; }
  .qa p { margin:0; }
  .secs-title { font-size:1.1rem; color:#cda; border-bottom:1px solid #2a2a2a;
                padding-bottom:6px; margin:34px 0 14px; }
  .secsum { margin:0 0 16px; }
  .secsum h3 { font-size:0.98rem; color:#b9c6d6; margin:0 0 6px; }
  .secsum p { margin:0; color:#d6d6d6; }
  footer { margin-top:40px; padding-top:16px; border-top:1px solid #2a2a2a;
           color:#888; font-size:12px; }
  mjx-container { overflow-x:auto; overflow-y:hidden; max-width:100%; }
</style>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body>
<div class="wrap">
  <nav><a href="index.html">← この分野の一覧</a> ・ <a href="../index.html">survey-app トップ</a></nav>
  <h1>{{title}}</h1>
  <div class="meta">{{authors}}<br>{{venue}} ・ {{published}} ・ source: {{source}}</div>
  <div class="links">{{links}}</div>
  <div class="tldr"><strong>一言で:</strong> {{tldr}}</div>
  {{sections}}
  {{sections_detail}}
  <footer>
    ⚠ このページは <strong>AIによる自動生成・要約</strong>です（誤りを含む可能性があります）。
    正確な内容は必ず原典をご確認ください。<br>
    情報源: {{basis}} ・ 要約エンジン: {{engine}} ・ 生成日: {{generated}}
  </footer>
</div>
</body>
</html>
